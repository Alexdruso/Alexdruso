name: README build

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Get Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: cache/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update SVG files
        env:
          # A fine-grained PAT (secrets.ACCESS_TOKEN) counts private contributions too;
          # without one, the workflow falls back to the default GITHUB_TOKEN
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: python today.py
      - name: Commit
        run: |-
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Update stats" || echo "No changes to commit"
          git push
